<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>???</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

  <div class="memory-game" id="game">
    <div class="memory-game__info">
      <div class="memory-game__round" id="round-display">Round 1 of 6</div>
      <div class="memory-game__status" id="status">Watch the sequence...</div>
    </div>

    <div class="memory-game__board" id="board" role="group" aria-label="Memory game pads">
      <button class="memory-pad memory-pad--0" data-index="0" aria-label="Blue pad" type="button"></button>
      <button class="memory-pad memory-pad--1" data-index="1" aria-label="Green pad" type="button"></button>
      <button class="memory-pad memory-pad--2" data-index="2" aria-label="Yellow pad" type="button"></button>
      <button class="memory-pad memory-pad--3" data-index="3" aria-label="Red pad" type="button"></button>
    </div>

    <button class="btn" id="start-btn" type="button">Start Game</button>
  </div>

  <!-- Win overlay -->
  <div class="memory-game__overlay" id="win-screen">
    <div class="memory-game__overlay-content">
      <h1 class="memory-game__overlay-title">You found the secret.</h1>
      <p class="memory-game__overlay-sub">Six rounds. Perfect memory. Not bad at all.</p>
      <button class="btn" id="win-restart" type="button">Play Again</button>
      <p class="mt-1"><a href="../index.html" style="font-size: 0.875rem;">Back to home</a></p>
    </div>
  </div>

  <!-- Lose overlay -->
  <div class="memory-game__overlay" id="lose-screen">
    <div class="memory-game__overlay-content">
      <h1 class="memory-game__overlay-title">Wrong one.</h1>
      <p class="memory-game__overlay-sub" id="lose-msg">You made it to round 1. Try again?</p>
      <button class="btn" id="lose-restart" type="button">Try Again</button>
      <p class="mt-1"><a href="../index.html" style="font-size: 0.875rem;">Back to home</a></p>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var pads = document.querySelectorAll(".memory-pad");
      var roundDisplay = document.getElementById("round-display");
      var statusEl = document.getElementById("status");
      var startBtn = document.getElementById("start-btn");
      var winScreen = document.getElementById("win-screen");
      var loseScreen = document.getElementById("lose-screen");
      var loseMsg = document.getElementById("lose-msg");
      var winRestart = document.getElementById("win-restart");
      var loseRestart = document.getElementById("lose-restart");

      var sequence = [];
      var playerIndex = 0;
      var round = 0;
      var maxRounds = 6;
      var isPlaying = false;    /* true while showing the sequence */
      var isPlayerTurn = false;
      var gameActive = false;

      /* Light up a pad briefly */
      function lightPad(index, duration) {
        pads[index].classList.add("is-lit");
        setTimeout(function () {
          pads[index].classList.remove("is-lit");
        }, duration);
      }

      /* Play the current sequence */
      function playSequence() {
        isPlaying = true;
        isPlayerTurn = false;
        statusEl.textContent = "Watch the sequence...";

        var delay = 0;
        for (var i = 0; i < sequence.length; i++) {
          (function (idx, d) {
            setTimeout(function () {
              lightPad(sequence[idx], 450);
            }, d);
          })(i, delay);
          delay += 650;
        }

        /* After sequence finishes, enable player input */
        setTimeout(function () {
          isPlaying = false;
          isPlayerTurn = true;
          playerIndex = 0;
          statusEl.textContent = "Your turn!";
        }, delay + 200);
      }

      /* Start a new round */
      function nextRound() {
        round++;
        roundDisplay.textContent = "Round " + round + " of " + maxRounds;

        /* Add a random pad to the sequence */
        sequence.push(Math.floor(Math.random() * 4));

        setTimeout(function () {
          playSequence();
        }, 500);
      }

      /* Handle player clicking a pad */
      function handlePadClick(index) {
        if (!isPlayerTurn || isPlaying || !gameActive) return;

        lightPad(index, 250);

        if (sequence[playerIndex] === index) {
          /* Correct */
          playerIndex++;

          if (playerIndex >= sequence.length) {
            /* Completed this round */
            isPlayerTurn = false;

            if (round >= maxRounds) {
              /* Win! */
              gameActive = false;
              statusEl.textContent = "";
              setTimeout(function () {
                winScreen.classList.add("is-visible");
                spawnConfetti();
              }, 400);
            } else {
              statusEl.textContent = "Nice!";
              setTimeout(nextRound, 800);
            }
          }
        } else {
          /* Wrong — game over */
          gameActive = false;
          isPlayerTurn = false;
          loseMsg.textContent = "You made it to round " + round + ". Try again?";
          setTimeout(function () {
            loseScreen.classList.add("is-visible");
          }, 400);
        }
      }

      /* Confetti for winning */
      function spawnConfetti() {
        var colors = ["#4d96ff", "#51cf66", "#ffd43b", "#ff6b6b", "#ff922b", "#cc5de8", "#20c997", "#f06595"];
        for (var i = 0; i < 60; i++) {
          var piece = document.createElement("div");
          piece.className = "confetti-piece";
          piece.style.left = Math.random() * 100 + "vw";
          piece.style.top = "-10px";
          piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          piece.style.animationDelay = Math.random() * 1.2 + "s";
          piece.style.animationDuration = 2 + Math.random() * 1.5 + "s";
          piece.style.width = 5 + Math.random() * 7 + "px";
          piece.style.height = 5 + Math.random() * 7 + "px";
          document.body.appendChild(piece);
        }
        setTimeout(function () {
          var pieces = document.querySelectorAll(".confetti-piece");
          for (var j = 0; j < pieces.length; j++) pieces[j].remove();
        }, 4000);
      }

      /* Reset everything */
      function reset() {
        sequence = [];
        playerIndex = 0;
        round = 0;
        isPlaying = false;
        isPlayerTurn = false;
        gameActive = true;
        winScreen.classList.remove("is-visible");
        loseScreen.classList.remove("is-visible");
        startBtn.style.display = "none";
        roundDisplay.textContent = "Round 1 of " + maxRounds;
        statusEl.textContent = "";

        /* Remove lingering confetti */
        var pieces = document.querySelectorAll(".confetti-piece");
        for (var i = 0; i < pieces.length; i++) pieces[i].remove();

        nextRound();
      }

      /* Pad click events */
      for (var i = 0; i < pads.length; i++) {
        (function (pad) {
          pad.addEventListener("click", function () {
            handlePadClick(parseInt(pad.dataset.index, 10));
          });
        })(pads[i]);
      }

      startBtn.addEventListener("click", reset);
      winRestart.addEventListener("click", reset);
      loseRestart.addEventListener("click", reset);
    })();
  </script>
</body>
</html>
