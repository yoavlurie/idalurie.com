<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>???</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="secret-game" id="secret-game" role="application" aria-label="The Hidden Click game">
    <span class="secret-game__counter" id="counter" aria-live="polite">0 / 20</span>
    <div class="secret-game__circle" id="circle" role="button" tabindex="0" aria-label="Click the circle"></div>

    <div class="secret-game__win" id="win-screen">
      <h1 class="secret-game__win-title">You found the secret.</h1>
      <p class="secret-game__win-subtitle">Nice work. Not everyone looks this closely.</p>
      <button class="btn" id="reset-btn">Play Again</button>
      <p style="margin-top: 1.5rem;"><a href="../index.html" style="font-size: 0.875rem;">Back to home</a></p>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var game = document.getElementById("secret-game");
      var circle = document.getElementById("circle");
      var counterEl = document.getElementById("counter");
      var winScreen = document.getElementById("win-screen");
      var resetBtn = document.getElementById("reset-btn");

      var clicks = 0;
      var maxClicks = 20;
      var hues = [220, 230, 200, 180, 260, 300, 340, 30, 50, 80, 120, 150, 190, 210, 240, 270, 310, 350, 20, 60];

      function moveCircle() {
        var w = window.innerWidth - 48;
        var h = window.innerHeight - 48;
        var x = Math.random() * w;
        var y = Math.random() * h;
        circle.style.left = x + "px";
        circle.style.top = y + "px";
      }

      function shiftBackground() {
        var hue = hues[clicks % hues.length];
        var lightness = document.documentElement.style.colorScheme === "dark" ? 12 : 96;
        game.style.backgroundColor = "hsl(" + hue + ", 30%, " + lightness + "%)";
      }

      function spawnConfetti() {
        var colors = ["#ff6b6b", "#ffd93d", "#6bcb77", "#4d96ff", "#ff922b", "#cc5de8", "#20c997", "#f06595"];
        for (var i = 0; i < 60; i++) {
          var piece = document.createElement("div");
          piece.className = "confetti-piece";
          piece.style.left = Math.random() * 100 + "vw";
          piece.style.top = -10 + "px";
          piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          piece.style.animationDelay = Math.random() * 1.2 + "s";
          piece.style.animationDuration = 2 + Math.random() * 1.5 + "s";
          piece.style.width = 6 + Math.random() * 6 + "px";
          piece.style.height = 6 + Math.random() * 6 + "px";
          document.body.appendChild(piece);
        }

        setTimeout(function () {
          var pieces = document.querySelectorAll(".confetti-piece");
          for (var j = 0; j < pieces.length; j++) {
            pieces[j].remove();
          }
        }, 4000);
      }

      function win() {
        circle.style.display = "none";
        counterEl.style.display = "none";
        game.style.backgroundColor = "";
        winScreen.classList.add("is-visible");
        spawnConfetti();
      }

      function handleClick() {
        clicks++;
        counterEl.textContent = clicks + " / " + maxClicks;
        shiftBackground();
        if (clicks >= maxClicks) {
          win();
        } else {
          moveCircle();
        }
      }

      function reset() {
        clicks = 0;
        counterEl.textContent = "0 / " + maxClicks;
        counterEl.style.display = "";
        circle.style.display = "";
        winScreen.classList.remove("is-visible");
        game.style.backgroundColor = "";
        moveCircle();
      }

      circle.addEventListener("click", handleClick);

      circle.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleClick();
        }
      });

      resetBtn.addEventListener("click", reset);

      moveCircle();
    })();
  </script>
</body>
</html>
